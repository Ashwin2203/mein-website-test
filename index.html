<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Entscheidung</title>
    <script>
        let neinClicks = 0;
        function handleChoice(choice) {
    if (choice === 'yes') {
        document.getElementById('glück').style.opacity = '1';
    } else {
        neinClicks++;

        if (neinClicks === 1) {
            alert('Fehler, bitte versuche es erneut💔.');
        }
    }
}
function moveButton(event) {
    if (neinClicks < 1) return;

    const btn = document.getElementById('neinBtn');

    const mouseX = event.clientX;
    const mouseY = event.clientY;

    const rect = btn.getBoundingClientRect();

    const btnX = rect.left + rect.width / 2;
    const btnY = rect.top + rect.height / 2;

    const distance = Math.hypot(mouseX - btnX, mouseY - btnY);

    if (distance < 120) {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        btn.style.position = 'absolute';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }
}
    </script>
    <style>
    body {
        background-color: lightpink;
        margin: 0;
        text-align: center;
        font-family: Arial, sans-serif;
    }
    button {
        margin: 10px;
        padding: 10px 20px;
        font-size: 16px;
        transition: all 0.3s ease;
}
        #glück {
            opacity: 0;
            transition: opacity 0.8s ease;

            margin-top: 20px;
            font-size: 1.5em;
            color: red;
            background-color: pink;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body onmousemove="moveButton(event)">
    <h1>Do you want to get to know me?</h1>
    <button onclick="handleChoice('yes')">yes☺️</button>
   <button id="neinBtn" onclick="handleChoice('no')">Nope😓</button>
    <div id="glück">
        <h2>Freut mich, dass du Interessiert bist❤️</h2>
        <p>so you want me❤️</p>
        <img src="https://officialpsds.com/imageview/rv/3p/rv3p65_large.png?1528770171"
    </div>
